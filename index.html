<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#f9c5d1">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="ほうせきどうぶつ">
<link rel="manifest" href="manifest.json">
<link rel="icon" type="image/png" href="img/hamu.png">
<link rel="apple-touch-icon" href="img/hamu.png">
<title>キラキラ ほうせきどうぶつ ひらがな・カタカナ</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@400;700;800&family=Mochiy+Pop+One&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; }
:root {
  --bg: #fff8ed; --bg2: #fdeede;
  --pink: #f9c5d1; --aqua: #b5e3e3; --lemon: #fce99b;
  --lavender: #d4c1e8; --mint: #c2e0ce; --peach: #f7d4b8;
  --moon: #b5cce8; --pearl: #f5ebe0; --diamond: #d6d6d6;
  --text: #6a5040;
  --shadow: 0 8px 24px rgba(180, 140, 110, 0.18);
}
html, body {
  margin: 0; padding: 0;
  font-family: 'M PLUS Rounded 1c', sans-serif;
  color: var(--text);
  min-height: 100vh;
  overflow-x: hidden;
  -webkit-tap-highlight-color: transparent;
  touch-action: manipulation;
}
body {
  /* TOP画面想定のパステルレインボー背景 */
  background:
    radial-gradient(ellipse at 50% 0%, rgba(255, 230, 245, 0.85) 0%, transparent 55%),
    radial-gradient(ellipse at 0% 30%, rgba(255, 200, 220, 0.55) 0%, transparent 50%),
    radial-gradient(ellipse at 100% 30%, rgba(200, 220, 255, 0.55) 0%, transparent 50%),
    radial-gradient(ellipse at 0% 80%, rgba(220, 200, 240, 0.55) 0%, transparent 55%),
    radial-gradient(ellipse at 100% 80%, rgba(200, 240, 220, 0.55) 0%, transparent 55%),
    radial-gradient(ellipse at 50% 100%, rgba(255, 240, 200, 0.65) 0%, transparent 55%),
    linear-gradient(180deg, #ffdaea 0%, #ffe5f0 20%, #ffe9ee 35%, #ece4f3 55%, #dff0f3 75%, #fff5e8 100%);
  background-attachment: fixed;
}
.bg-sparkles {
  position: fixed; inset: 0;
  pointer-events: none; z-index: 0;
  overflow: hidden;
}
.bg-sparkles::before, .bg-sparkles::after {
  content: ''; position: absolute;
  width: 200%; height: 200%;
  background-image:
    radial-gradient(3px 3px at 10% 20%, rgba(249,197,209,0.85) 50%, transparent 100%),
    radial-gradient(2.5px 2.5px at 25% 70%, rgba(181,204,232,0.8) 50%, transparent 100%),
    radial-gradient(2px 2px at 45% 30%, rgba(252,233,155,0.9) 50%, transparent 100%),
    radial-gradient(2.5px 2.5px at 70% 50%, rgba(212,193,232,0.8) 50%, transparent 100%),
    radial-gradient(3px 3px at 85% 80%, rgba(194,224,206,0.75) 50%, transparent 100%),
    radial-gradient(2px 2px at 60% 15%, rgba(247,212,184,0.8) 50%, transparent 100%),
    radial-gradient(2px 2px at 33% 88%, rgba(255,255,255,0.85) 50%, transparent 100%),
    radial-gradient(2.5px 2.5px at 92% 25%, rgba(255,222,173,0.85) 50%, transparent 100%);
  animation: float 40s linear infinite, twinkleBg 3s ease-in-out infinite alternate;
  opacity: 0.85;
}
.bg-sparkles::after { animation-duration: 60s, 4s; animation-direction: reverse, alternate; opacity: 0.65; }
@keyframes float { 0%{transform:translate(0,0);} 100%{transform:translate(-50%,-50%);} }
@keyframes twinkleBg { 0%{filter:brightness(1);} 100%{filter:brightness(1.4);} }

/* 宝石シャワー (TOP画面) */
.gem-rain {
  position: fixed;
  top: var(--start-y, -100px);
  width: var(--size, 50px);
  height: var(--size, 50px);
  pointer-events: none;
  z-index: 0;
  object-fit: contain;
  animation: gemRain var(--dur, 6s) linear forwards;
  filter: drop-shadow(0 4px 14px rgba(255, 200, 220, 0.75)) drop-shadow(0 0 8px rgba(255,255,255,0.5));
  opacity: 0;
  will-change: transform, opacity;
}
@keyframes gemRain {
  0% { transform: translate(0, 0) rotate(0deg) scale(0.8); opacity: 0; }
  6% { opacity: 0.95; transform: translate(calc(var(--sway)*0.1), 5vh) rotate(calc(var(--rot)*0.1)) scale(1); }
  50% { transform: translate(calc(var(--sway)*0.7), 55vh) rotate(calc(var(--rot)*0.5)) scale(1); opacity: 0.95; }
  90% { opacity: 0.9; }
  100% { transform: translate(var(--sway), 115vh) rotate(var(--rot)) scale(0.9); opacity: 0; }
}

/* タイトル周りのキラキラ */
.title-sparkles {
  position: relative;
  width: 100%;
  pointer-events: none;
}
.title-sparkles .ts {
  position: absolute;
  font-size: 1.6rem;
  animation: tsTwinkle 1.8s ease-in-out infinite;
  filter: drop-shadow(0 0 8px rgba(255,230,150,0.8));
}
.title-sparkles .ts.t1 { top: -10px; left: 8%; color: #ffd166; animation-delay: 0s; font-size: 1.8rem; }
.title-sparkles .ts.t2 { top: -22px; right: 12%; color: #f9c5d1; animation-delay: -0.4s; font-size: 2rem; }
.title-sparkles .ts.t3 { bottom: -10px; left: 18%; color: #d4c1e8; animation-delay: -0.8s; font-size: 1.5rem; }
.title-sparkles .ts.t4 { bottom: -18px; right: 8%; color: #b5cce8; animation-delay: -1.2s; font-size: 1.7rem; }
.title-sparkles .ts.t5 { top: 10px; left: 45%; color: #fff8b0; animation-delay: -0.2s; font-size: 1.3rem; }
@keyframes tsTwinkle {
  0%, 100% { transform: scale(0.6) rotate(0deg); opacity: 0.5; }
  50% { transform: scale(1.3) rotate(180deg); opacity: 1; }
}

.app {
  max-width: 820px;
  margin: 0 auto;
  padding: 20px;
  min-height: 100vh;
  position: relative;
  z-index: 1;
}
.screen { display: none; flex-direction: column; align-items: center; animation: fadeScreen 0.5s ease; }
.screen.active { display: flex; }
@keyframes fadeScreen { from{opacity:0;transform:translateY(10px);} to{opacity:1;transform:translateY(0);} }

.title {
  font-family: 'Mochiy Pop One', sans-serif;
  font-size: clamp(1.8rem, 6vw, 2.8rem);
  text-align: center;
  background: linear-gradient(180deg, #ffaac8 0%, #f497b5 25%, #c98ad6 55%, #8fb8d8 80%, #95c8a8 100%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  margin: 16px 0 8px;
  letter-spacing: 0.05em;
  line-height: 1.3;
  position: relative;
  z-index: 3;
  /* 白い縁取り + 影 */
  filter:
    drop-shadow( 2px 0 0 white) drop-shadow(-2px 0 0 white)
    drop-shadow(0 2px 0 white) drop-shadow(0 -2px 0 white)
    drop-shadow( 2px 2px 0 white) drop-shadow(-2px -2px 0 white)
    drop-shadow( 2px -2px 0 white) drop-shadow(-2px 2px 0 white)
    drop-shadow(0 4px 0 rgba(232, 138, 168, 0.5))
    drop-shadow(0 10px 16px rgba(212, 154, 200, 0.5));
}
.subtitle {
  font-size: clamp(0.95rem, 2.5vw, 1.15rem);
  color: #a08070; text-align: center;
  margin-bottom: 24px; line-height: 1.5;
}

/* ===== Start: 周りに散らす宝石装飾 ===== */
.start-decor {
  position: absolute;
  inset: 0;
  pointer-events: none;
  z-index: 0;
  overflow: hidden;
}
.start-decor img {
  position: absolute;
  filter: drop-shadow(0 6px 16px rgba(232, 154, 200, 0.55)) drop-shadow(0 0 4px rgba(255,255,255,0.7));
  animation: decorFloat var(--dur, 4s) ease-in-out infinite;
  animation-delay: var(--delay, 0s);
}
@keyframes decorFloat {
  0%, 100% { transform: translateY(0) rotate(var(--rot-a, -6deg)) scale(1); }
  50% { transform: translateY(-14px) rotate(var(--rot-b, 6deg)) scale(1.06); }
}

/* ===== Start illustration ===== */
.start-illust {
  margin: 0 auto 4px; width: 100%; max-width: 420px;
  display: flex; justify-content: center; align-items: flex-end;
  gap: 10px; padding: 0 10px;
}
.start-anim {
  position: relative;
  width: clamp(90px, 24vw, 130px);
  aspect-ratio: 1;
  display: flex; align-items: center; justify-content: center;
  filter: drop-shadow(0 8px 14px rgba(180, 140, 110, 0.18));
}
.start-anim::before {
  content: ''; position: absolute; inset: 8%;
  background: radial-gradient(circle at 35% 30%, color-mix(in srgb, var(--tint) 70%, white) 0%, var(--tint) 50%, transparent 75%);
  border-radius: 50%; filter: blur(14px); opacity: 0.55; z-index: -1;
}
.start-anim img {
  width: 100%; height: 100%; object-fit: contain;
  animation: bobble 3.4s ease-in-out infinite;
}
.start-anim:nth-child(2) img { animation-delay: -0.6s; }
.start-anim:nth-child(3) img { animation-delay: -1.2s; }
@keyframes bobble {
  0%, 100% { transform: translateY(0) rotate(-3deg); }
  50% { transform: translateY(-10px) rotate(3deg); }
}

/* ===== Buttons ===== */
.btn {
  font-family: inherit; font-weight: 700;
  font-size: 1.1rem; border: none;
  border-radius: 999px; padding: 16px 32px;
  cursor: pointer; background: white; color: var(--text);
  box-shadow: var(--shadow);
  transition: transform 0.2s cubic-bezier(0.34, 1.56, 0.64, 1), box-shadow 0.2s;
  border: 3px solid white;
  touch-action: manipulation;
}
.btn:active { transform: scale(0.96); }
.btn.pink { background: linear-gradient(135deg, #fde0e7, #f9c5d1); }
.btn.aqua { background: linear-gradient(135deg, #e8f6f6, #b5e3e3); }
.btn.lemon { background: linear-gradient(135deg, #fef7d6, #fce99b); }
.btn.lavender { background: linear-gradient(135deg, #ece4f3, #d4c1e8); }
.btn.mint { background: linear-gradient(135deg, #dff0e3, #c2e0ce); }
.btn.peach { background: linear-gradient(135deg, #fde8d6, #f7d4b8); }
.mode-buttons {
  display: flex; flex-direction: column; gap: 16px;
  margin-top: 16px; width: 100%; max-width: 380px;
}
.mode-btn {
  font-size: 1.4rem; padding: 24px 40px;
  display: flex; align-items: center; justify-content: center;
  gap: 14px; font-family: 'Mochiy Pop One', sans-serif;
}
.mode-btn .ico { font-size: 1.7rem; }

/* ===== Game header ===== */
.game-header {
  width: 100%;
  display: flex; justify-content: space-between; align-items: center;
  padding: 12px 16px;
  background: rgba(255,255,255,0.7);
  backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
  border-radius: 24px; box-shadow: var(--shadow);
  margin-bottom: 18px; gap: 12px;
  border: 3px solid white;
}
.gem-counter {
  display: flex; align-items: center; gap: 6px;
  font-size: 1.3rem; font-weight: 800; color: #b89cd6;
  cursor: pointer; padding: 6px 10px; border-radius: 16px;
  transition: background 0.2s;
}
.gem-counter:hover { background: rgba(255,255,255,0.7); }
.gem-icon { font-size: 1.6rem; animation: gemPulse 2s ease-in-out infinite; display: inline-block; }
@keyframes gemPulse { 0%,100%{transform:scale(1) rotate(0);} 50%{transform:scale(1.15) rotate(8deg);} }
.progress-wrap {
  flex: 1; min-width: 80px; display: flex; flex-direction: column; gap: 2px;
}
.progress-bar {
  height: 14px; background: rgba(245, 235, 224, 0.7);
  border-radius: 999px; overflow: hidden; position: relative;
  border: 2px solid white;
}
.progress-fill {
  height: 100%;
  background: linear-gradient(90deg, #f9c5d1, #d4c1e8, #b5cce8, #c2e0ce, #fce99b);
  background-size: 300% 100%;
  transition: width 0.6s cubic-bezier(0.4, 0, 0.2, 1);
  border-radius: 999px;
  animation: shimmer 4s linear infinite;
}
@keyframes shimmer { 0%{background-position:0% 50%;} 100%{background-position:300% 50%;} }
.progress-label { font-size: 0.72rem; color: #a08070; text-align: center; }
.icon-btn {
  width: 46px; height: 46px;
  border-radius: 50%; background: white; border: 3px solid white;
  font-size: 1.4rem; cursor: pointer; box-shadow: var(--shadow);
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0; font-family: inherit; color: var(--text);
}
.icon-btn:active { transform: scale(0.92); }

/* ===== Kind tabs (hira/kata) ===== */
.kind-tabs {
  display: flex; gap: 10px; margin-bottom: 14px;
  background: rgba(255,255,255,0.5); padding: 6px;
  border-radius: 999px; border: 2px solid white;
}
.kind-tab {
  flex: 1; padding: 10px 18px; border-radius: 999px;
  border: none; background: transparent; font-family: 'Mochiy Pop One', sans-serif;
  font-size: 1.1rem; color: #a08070; cursor: pointer;
}
.kind-tab.active {
  background: linear-gradient(135deg, #fde0e7, #f9c5d1);
  color: var(--text); box-shadow: var(--shadow);
}

/* ===== Char grid (五十音表 10列) ===== */
.char-grid {
  display: grid;
  grid-template-columns: repeat(10, 1fr);
  gap: 5px;
  width: 100%;
}
.char-cell {
  position: relative;
  aspect-ratio: 1;
  border-radius: 14px;
  font-family: 'Mochiy Pop One', sans-serif;
  font-size: clamp(0.9rem, 3vw, 1.8rem);
  color: var(--text);
  padding: 0;
  transition: transform 0.2s cubic-bezier(0.34, 1.56, 0.64, 1);
  display: flex;
  align-items: center;
  justify-content: center;
  line-height: 1;
}
.char-cell.supported {
  cursor: pointer;
  border: 3px solid white;
  background: linear-gradient(135deg, #fde0e7, #f9c5d1);
  box-shadow: var(--shadow);
}
.char-cell.supported:active { transform: scale(0.92); }
.char-cell.empty {
  background: transparent;
  border: none;
  box-shadow: none;
  cursor: default;
  pointer-events: none;
}
.char-cell .cc { display: block; }

/* ===== Trace screen ===== */
.trace-header {
  font-family: 'Mochiy Pop One', sans-serif;
  font-size: clamp(1rem, 3vw, 1.3rem);
  color: var(--text); margin: 4px 0 8px;
  display: flex; align-items: center; gap: 10px; justify-content: center;
}
.trace-title-char {
  font-size: clamp(2rem, 6vw, 2.6rem);
  background: linear-gradient(135deg, #e89aab, #d4a8e8);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  background-clip: text;
}
.trace-card {
  width: 100%; max-width: 480px;
  background: white; border-radius: 32px;
  padding: 20px; box-shadow: var(--shadow);
  border: 4px solid white; position: relative;
  display: flex; flex-direction: column; align-items: center;
}
.trace-svg {
  width: 100%; aspect-ratio: 1;
  border-radius: 24px;
  background:
    linear-gradient(135deg, #fffefb 0%, #fff5ef 100%),
    repeating-linear-gradient(0deg, transparent 0, transparent 19px, rgba(232,154,171,0.06) 20px),
    repeating-linear-gradient(90deg, transparent 0, transparent 19px, rgba(232,154,171,0.06) 20px);
  background-blend-mode: normal;
  touch-action: none !important;
  -ms-touch-action: none;
  -webkit-user-select: none;
  user-select: none;
  -webkit-touch-callout: none;
  overscroll-behavior: contain;
  display: block;
  position: relative;
  border: 3px dashed rgba(212,193,232,0.5);
  transition: border-color 0.2s;
}
/* なぞり画面では body 全体のスクロールも止める */
body.tracing { overflow: hidden; overscroll-behavior: none; }
.trace-svg.hint-flash { border-color: #e89aab; background-color: #fdeef2; }

/* SVG inner */
.trace-svg .bg-char {
  font-family: 'Mochiy Pop One', 'M PLUS Rounded 1c', sans-serif;
  font-size: 82px;
  font-weight: 400;
  fill: rgba(180, 140, 110, 0.2);
  pointer-events: none;
}
.trace-svg .free-hint {
  font-family: 'M PLUS Rounded 1c', sans-serif;
  font-size: 5px; fill: #a08070; pointer-events: none;
}
/* KanjiVG ストロークパス (お手本) */
.trace-svg .kvg-stroke {
  fill: none; stroke-linecap: round; stroke-linejoin: round;
  pointer-events: none;
}
.trace-svg .kvg-stroke.todo { stroke: rgba(180, 160, 140, 0.32); stroke-width: 4; }
.trace-svg .kvg-stroke.cur  { stroke: rgba(232, 154, 171, 0.6); stroke-width: 5.5; animation: curPulse 1.6s ease-in-out infinite; }
.trace-svg .kvg-stroke.done { stroke: rgba(106, 184, 140, 0.7); stroke-width: 4.5; }
@keyframes curPulse { 0%,100%{opacity:0.55;} 50%{opacity:0.95;} }
.trace-svg .num-badge text {
  font-family: 'Mochiy Pop One', sans-serif;
  font-size: 6.5px; fill: white; pointer-events: none; font-weight: 800;
}
.trace-svg .num-badge circle { pointer-events: none; stroke: white; stroke-width: 1.2; }
.trace-svg .num-badge.todo circle { fill: #c8b5d0; opacity: 0.7; }
.trace-svg .num-badge.cur circle { fill: #e89aab; animation: numPulse 1.4s ease-in-out infinite; }
.trace-svg .num-badge.done circle { fill: #6ab88c; }
.trace-svg .num-arrow-line {
  stroke: #e89aab; stroke-width: 2.4; stroke-linecap: round;
  pointer-events: none;
  animation: arrowPulse 1.4s ease-in-out infinite;
}
.trace-svg .num-arrow-head {
  fill: #e89aab; stroke: white; stroke-width: 0.5;
  pointer-events: none;
  animation: arrowPulse 1.4s ease-in-out infinite;
}
@keyframes numPulse { 0%,100%{r:6;} 50%{r:7;} }
@keyframes arrowPulse { 0%,100%{opacity:0.85;} 50%{opacity:1;} }
.trace-svg .user-trail {
  fill: none;
  stroke: url(#trailGrad);
  stroke-width: 5.5;
  stroke-linecap: round;
  stroke-linejoin: round;
  pointer-events: none;
  filter: drop-shadow(0 0 2px rgba(232,154,171,0.5));
  opacity: 0.85;
}

.stroke-indicator {
  display: flex; gap: 10px; margin-top: 14px; flex-wrap: wrap; justify-content: center;
}
.stroke-indicator .dot {
  width: 36px; height: 36px; border-radius: 50%;
  background: #f5ebe0; color: #a08070;
  display: flex; align-items: center; justify-content: center;
  font-family: 'Mochiy Pop One', sans-serif; font-size: 1rem;
  border: 3px solid white; box-shadow: var(--shadow);
}
.stroke-indicator .dot.cur { background: linear-gradient(135deg, #fde0e7, #f9c5d1); color: var(--text); animation: numPulse 1.4s ease-in-out infinite; }
.stroke-indicator .dot.done { background: linear-gradient(135deg, #d6f1e0, #95d8af); color: white; }
.stroke-indicator .free-label {
  padding: 6px 16px; background: #f5ebe0; border-radius: 999px;
  color: #a08070; font-family: 'Mochiy Pop One', sans-serif; font-size: 0.95rem;
}
.trace-actions {
  display: flex; gap: 12px; margin-top: 16px; flex-wrap: wrap; justify-content: center;
}
.trace-feedback {
  min-height: 36px; margin-top: 8px;
  display: flex; align-items: center; justify-content: center;
}

/* ===== Word quiz ===== */
.word-card {
  width: 100%; max-width: 500px;
  background: linear-gradient(135deg, #ffffff 0%, #fff8f3 100%);
  border-radius: 36px; padding: 30px 20px 20px;
  box-shadow: var(--shadow); border: 4px solid white;
  text-align: center; position: relative;
}
.word-card::before, .word-card::after {
  content: '✦'; position: absolute; font-size: 1.8rem; opacity: 0.35;
}
.word-card::before { top: 16px; left: 20px; color: #d4c1e8; }
.word-card::after { bottom: 16px; right: 20px; color: #f9c5d1; }
.word-prompt {
  font-size: 0.95rem; color: #a08070; margin-bottom: 6px; font-weight: 700;
}
.word-emoji {
  font-size: clamp(5rem, 18vw, 8rem);
  line-height: 1; margin: 4px 0;
  cursor: pointer; user-select: none;
  filter: drop-shadow(0 4px 12px rgba(180, 140, 220, 0.2));
  animation: charPop 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
}
@keyframes charPop { 0%{transform:scale(0.5);opacity:0;} 100%{transform:scale(1);opacity:1;} }
.word-hint {
  font-family: 'Mochiy Pop One', sans-serif;
  font-size: clamp(1.5rem, 5vw, 2rem);
  letter-spacing: 0.1em;
  color: var(--text); margin-top: 4px;
}
.word-hint .blank {
  display: inline-block;
  background: linear-gradient(135deg, #fde0e7, #f9c5d1);
  color: white;
  border-radius: 12px;
  padding: 0 14px;
  margin-right: 4px;
  border: 3px solid white;
  box-shadow: var(--shadow);
  animation: blinkBg 1.5s ease-in-out infinite;
}
@keyframes blinkBg {
  0%, 100% { transform: scale(1); }
  50% { transform: scale(1.05); }
}
.word-choices {
  display: grid; grid-template-columns: repeat(4, 1fr);
  gap: 12px; width: 100%; max-width: 500px; margin-top: 18px;
}
.word-choice {
  padding: 20px 8px; border-radius: 22px;
  border: 4px solid white;
  font-family: 'Mochiy Pop One', sans-serif;
  font-size: clamp(1.6rem, 6vw, 2.2rem);
  cursor: pointer; color: var(--text);
  box-shadow: var(--shadow);
  transition: transform 0.2s cubic-bezier(0.34, 1.56, 0.64, 1);
  background: white;
  letter-spacing: 0.05em;
}
.word-choice:nth-child(1) { background: linear-gradient(135deg, #fdeef2, #f9c5d1); }
.word-choice:nth-child(2) { background: linear-gradient(135deg, #e8f6f6, #b5e3e3); }
.word-choice:nth-child(3) { background: linear-gradient(135deg, #fef7d6, #fce99b); }
.word-choice:nth-child(4) { background: linear-gradient(135deg, #ece4f3, #d4c1e8); }
.word-choice:active:not(:disabled) { transform: scale(0.94); }
.word-choice.correct {
  background: linear-gradient(135deg, #d6f1e0, #95d8af) !important;
  animation: correctBounce 0.6s ease; border-color: #6ab88c;
}
.word-choice.wrong {
  background: linear-gradient(135deg, #fad8d8, #f5a8a8) !important;
  animation: wrongShake 0.4s ease; border-color: #e89898;
}
@keyframes correctBounce { 0%,100%{transform:scale(1);} 30%{transform:scale(1.18) rotate(-3deg);} 60%{transform:scale(0.95) rotate(2deg);} }
@keyframes wrongShake { 0%,100%{transform:translateX(0);} 25%{transform:translateX(-8px);} 75%{transform:translateX(8px);} }
.word-feedback {
  min-height: 40px; margin-top: 14px;
  display: flex; align-items: center; justify-content: center;
}
.feedback { font-family: 'Mochiy Pop One', sans-serif; font-size: 1.4rem; }
.feedback.correct { color: #6ab88c; animation: pop 0.5s cubic-bezier(0.34, 1.56, 0.64, 1); }
.feedback.wrong { color: #d68888; }
@keyframes pop { 0%{transform:scale(0);opacity:0;} 60%{transform:scale(1.25);} 100%{transform:scale(1);opacity:1;} }

/* ===== Gem & sparkles ===== */
.gem-fly {
  position: fixed;
  width: var(--size, 40px);
  height: var(--size, 40px);
  pointer-events: none; z-index: 100;
  animation: gemFly 1.3s cubic-bezier(0.4, 0, 0.2, 1) forwards;
  filter: drop-shadow(0 0 10px rgba(255,255,255,0.85));
  object-fit: contain;
  transform-origin: center;
}
@keyframes gemFly {
  0% { transform: translate(0,0) scale(0.3) rotate(0); opacity: 0; }
  15% { transform: translate(calc(var(--mx)*0.5), calc(var(--my)*0.5)) scale(1.3) rotate(calc(var(--rot)*0.4)); opacity: 1; }
  35% { transform: translate(var(--mx), var(--my)) scale(1.15) rotate(calc(var(--rot)*0.7)); opacity: 1; }
  100% { transform: translate(var(--tx), var(--ty)) scale(0.5) rotate(var(--rot)); opacity: 0; }
}
.spark-burst {
  position: fixed; pointer-events: none;
  font-size: 1.8rem; z-index: 99;
  transition: all 0.8s cubic-bezier(0.4, 0, 0.2, 1);
}

/* ===== Collection ===== */
.collection {
  display: grid; grid-template-columns: repeat(5, 1fr);
  gap: 10px; width: 100%; padding: 16px;
  background: rgba(255,255,255,0.6);
  border-radius: 24px; box-shadow: var(--shadow);
  border: 3px solid white;
}
.animal-slot {
  aspect-ratio: 1; border-radius: 18px;
  background: rgba(255,255,255,0.5);
  display: flex; align-items: center; justify-content: center;
  border: 3px dashed rgba(180,140,110,0.25);
  position: relative; overflow: hidden;
  cursor: pointer; transition: transform 0.2s;
}
.animal-slot.unlocked {
  background: linear-gradient(135deg, #ffffff, #fff8f3);
  border: 3px solid white; box-shadow: var(--shadow);
}
.animal-slot.unlocked:active { transform: scale(1.05); }
.animal-slot.locked::after {
  content: '?'; font-family: 'Mochiy Pop One', sans-serif;
  font-size: 1.8rem; color: rgba(180,140,110,0.35);
}
.animal-slot .animal-img-wrap { width: 96%; height: 96%; }
.animal-slot .animal-img-wrap img { filter: drop-shadow(0 2px 6px color-mix(in srgb, var(--tint, #f9c5d1) 60%, transparent)); }
.animal-img-wrap {
  position: relative; width: 100%; height: 100%;
  display: flex; align-items: center; justify-content: center;
}
.animal-img-wrap img {
  width: 100%; height: 100%; object-fit: contain;
  position: relative; z-index: 2;
  filter: drop-shadow(0 4px 12px color-mix(in srgb, var(--tint, #f9c5d1) 70%, transparent));
}
.animal-glow {
  position: absolute; inset: 8%;
  background: radial-gradient(circle at 35% 30%, color-mix(in srgb, var(--tint, #fff) 80%, white) 0%, var(--tint, #f9c5d1) 45%, transparent 75%);
  border-radius: 50%; filter: blur(20px); opacity: 0.55;
  z-index: 1; animation: glowPulse 3s ease-in-out infinite;
}
@keyframes glowPulse { 0%,100%{opacity:0.45;transform:scale(1);} 50%{opacity:0.7;transform:scale(1.08);} }
.ai-sparkle {
  position: absolute; font-size: 1.6rem;
  pointer-events: none; z-index: 3; opacity: 0.8;
  animation: sparkleTwinkle 2.4s ease-in-out infinite;
}
.ai-sparkle.s1 { top: 8%; left: 10%; color: #f9c5d1; animation-delay: 0s; }
.ai-sparkle.s2 { top: 14%; right: 12%; color: #fce99b; animation-delay: -0.6s; font-size: 1.3rem; }
.ai-sparkle.s3 { bottom: 18%; left: 8%; color: #d4c1e8; animation-delay: -1.2s; font-size: 1.4rem; }
.ai-sparkle.s4 { bottom: 12%; right: 10%; color: #b5cce8; animation-delay: -1.8s; font-size: 1.2rem; }
@keyframes sparkleTwinkle { 0%,100%{opacity:0.4;transform:scale(0.8) rotate(0);} 50%{opacity:1;transform:scale(1.2) rotate(180deg);} }

/* ===== Catch modal ===== */
.catch-modal {
  position: fixed; inset: 0;
  background: linear-gradient(135deg, rgba(255, 248, 237, 0.96), rgba(253, 234, 222, 0.96));
  backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
  display: none; align-items: center; justify-content: center;
  z-index: 1000; flex-direction: column; padding: 20px;
}
.catch-modal.active { display: flex; }
.catch-title {
  font-family: 'Mochiy Pop One', sans-serif;
  font-size: clamp(1.5rem, 5vw, 2.2rem);
  background: linear-gradient(135deg, #e89aab, #d4a8e8, #8fb8d8);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  background-clip: text;
  animation: bounceIn 0.7s cubic-bezier(0.34, 1.56, 0.64, 1);
  text-align: center; margin-bottom: 16px; letter-spacing: 0.04em;
}
@keyframes bounceIn { 0%{transform:scale(0) rotate(-15deg);opacity:0;} 60%{transform:scale(1.2) rotate(5deg);} 100%{transform:scale(1) rotate(0);opacity:1;} }
.catch-animal {
  width: clamp(220px, 60vw, 320px); height: clamp(220px, 60vw, 320px);
  animation: reveal 1.1s cubic-bezier(0.34, 1.56, 0.64, 1);
  filter: drop-shadow(0 0 40px rgba(255,255,255,0.9));
}
.catch-animal .animal-img-wrap { animation: idleFloat 2.5s ease-in-out infinite; }
@keyframes idleFloat { 0%,100%{transform:translateY(0) rotate(-1deg);} 50%{transform:translateY(-10px) rotate(1deg);} }
@keyframes reveal { 0%{transform:scale(0) rotate(-180deg);opacity:0;} 60%{transform:scale(1.15) rotate(10deg);} 100%{transform:scale(1) rotate(0);opacity:1;} }
.catch-name {
  font-family: 'Mochiy Pop One', sans-serif;
  font-size: clamp(1.2rem, 4vw, 1.7rem);
  margin-top: 16px; color: #6a5040;
  animation: fadeUp 0.8s ease 0.6s both; text-align: center;
}
.catch-sub {
  font-size: 0.95rem; color: #a08070;
  margin-top: 4px; animation: fadeUp 0.8s ease 0.8s both;
}
@keyframes fadeUp { from{opacity:0;transform:translateY(20px);} to{opacity:1;transform:translateY(0);} }
.confetti {
  position: absolute; width: 10px; height: 10px;
  pointer-events: none; animation: confettiFall 3s linear forwards;
}
@keyframes confettiFall { 0%{transform:translate(0,-100vh) rotate(0);opacity:1;} 100%{transform:translate(var(--cx),100vh) rotate(720deg);opacity:0;} }
.actions { display: flex; gap: 12px; margin-top: 24px; flex-wrap: wrap; justify-content: center; }

@media (max-width: 480px) {
  .app { padding: 14px; }
  .collection { gap: 7px; padding: 12px; }
  .char-grid { gap: 3px; }
  .mode-btn { font-size: 1.2rem; padding: 20px 30px; }
  .word-choices { gap: 8px; }
}
@media (min-width: 700px) {
  .word-choices { grid-template-columns: repeat(4, 1fr); }
}
</style>
</head>
<body>
<div class="bg-sparkles"></div>

<!-- SVG defs (gradient for trail) -->
<svg width="0" height="0" style="position:absolute">
  <defs>
    <linearGradient id="trailGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#e89aab"/>
      <stop offset="50%" stop-color="#d4a8e8"/>
      <stop offset="100%" stop-color="#8fb8d8"/>
    </linearGradient>
  </defs>
</svg>

<div class="app">

  <!-- ===== Start ===== -->
  <div class="screen active" id="screenStart">
    <div class="start-decor" id="startDecor"></div>
    <div class="start-illust" id="startIllust"></div>
    <div class="title-sparkles">
      <span class="ts t1">✦</span>
      <span class="ts t2">✨</span>
      <span class="ts t3">⭐</span>
      <span class="ts t4">💫</span>
      <span class="ts t5">✧</span>
    </div>
    <h1 class="title">キラキラ<br>ほうせきどうぶつ</h1>
    <p class="subtitle">じを なぞって おぼえて<br>ほうせきの どうぶつを あつめよう！</p>
    <div class="mode-buttons">
      <button class="btn mode-btn pink" id="toTraceBtn">
        <span class="ico">✏️</span>なぞる
      </button>
      <button class="btn mode-btn aqua" id="toWordBtn">
        <span class="ico">🌸</span>ことば
      </button>
    </div>
    <button class="btn lemon" id="showCollectionBtn" style="margin-top: 22px;">
      📖 ずかん
    </button>
  </div>

  <!-- ===== Char select (for trace) ===== -->
  <div class="screen" id="screenCharSelect">
    <div class="game-header">
      <button class="icon-btn" data-back="screenStart" aria-label="もどる">←</button>
      <div class="gem-counter"><span class="gem-icon">💎</span><span class="gem-count">0</span></div>
      <div class="progress-wrap">
        <div class="progress-bar"><div class="progress-fill" style="width:0%"></div></div>
        <div class="progress-label">つぎの なかままで</div>
      </div>
    </div>
    <h2 class="title" style="font-size: clamp(1.4rem, 4vw, 2rem); margin: 8px 0 4px;">なぞる もじを えらぼう</h2>
    <p class="subtitle" style="margin-bottom: 16px;">✦ マークの もじは かきじゅん つき</p>
    <div class="kind-tabs" id="kindTabs">
      <button class="kind-tab active" data-kind="hira">ひらがな</button>
      <button class="kind-tab" data-kind="kata">カタカナ</button>
    </div>
    <div class="char-grid" id="charGrid"></div>
  </div>

  <!-- ===== Trace ===== -->
  <div class="screen" id="screenTrace">
    <div class="game-header">
      <button class="icon-btn" data-back="screenCharSelect" aria-label="もどる">←</button>
      <div class="gem-counter"><span class="gem-icon">💎</span><span class="gem-count">0</span></div>
      <div class="progress-wrap">
        <div class="progress-bar"><div class="progress-fill" style="width:0%"></div></div>
        <div class="progress-label">つぎの なかままで</div>
      </div>
    </div>
    <div class="trace-header">
      <span>このじを なぞろう</span>
      <span class="trace-title-char" id="traceTitle">あ</span>
      <button class="icon-btn" id="traceSpeakBtn" aria-label="きく" style="width:38px;height:38px;font-size:1.1rem;">🔊</button>
    </div>
    <div class="trace-card">
      <svg class="trace-svg" id="traceSvg" viewBox="0 0 109 109" preserveAspectRatio="xMidYMid meet"></svg>
      <div class="stroke-indicator" id="strokeIndicator"></div>
      <div class="trace-feedback" id="traceFeedback"></div>
      <div class="trace-actions">
        <button class="btn lavender" id="traceResetBtn">やりなおし</button>
        <button class="btn mint" id="traceNextBtn">つぎの もじ</button>
      </div>
    </div>
  </div>

  <!-- ===== Word quiz ===== -->
  <div class="screen" id="screenWord">
    <div class="game-header">
      <button class="icon-btn" data-back="screenStart" aria-label="もどる">←</button>
      <div class="gem-counter"><span class="gem-icon">💎</span><span class="gem-count">0</span></div>
      <div class="progress-wrap">
        <div class="progress-bar"><div class="progress-fill" style="width:0%"></div></div>
        <div class="progress-label">つぎの なかままで</div>
      </div>
    </div>
    <div class="kind-tabs" id="kindTabsWord" style="display:none">
      <button class="kind-tab active" data-kind="hira">ひらがな</button>
      <button class="kind-tab" data-kind="kata">カタカナ</button>
    </div>
    <div class="word-card">
      <div class="word-prompt">このえは どのもじから はじまる？</div>
      <div class="word-emoji" id="wordEmoji">🐰</div>
      <div class="word-hint" id="wordHint"></div>
    </div>
    <div class="word-choices" id="wordChoices"></div>
    <div class="word-feedback" id="wordFeedback"></div>
  </div>

  <!-- ===== Collection ===== -->
  <div class="screen" id="screenCollection">
    <h2 class="title">ほうせきずかん</h2>
    <p class="subtitle" id="collectionSub">あつめた どうぶつたち</p>
    <div class="collection" id="collectionGrid"></div>
    <div class="actions">
      <button class="btn pink" data-back="screenStart">もどる</button>
    </div>
  </div>

</div>

<!-- ===== Catch modal ===== -->
<div class="catch-modal" id="catchModal">
  <div class="catch-title">あたらしい なかま！</div>
  <div class="catch-animal" id="catchAnimal"></div>
  <div class="catch-name" id="catchName"></div>
  <div class="catch-sub" id="catchSub"></div>
  <button class="btn lavender" id="catchCloseBtn" style="margin-top: 24px;">つづける</button>
</div>

<script src="data.js"></script>
<script src="game.js"></script>
<script>
  // PWA: Service Worker 登録
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('service-worker.js').catch(err => console.warn('SW register failed:', err));
    });
  }
</script>
</body>
</html>
